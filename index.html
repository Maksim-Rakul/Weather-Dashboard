                type="text"
                name="city"
                id="city"
                placeholder="Find your city..."

              <svg class="header_input_icon">
                <use href="./src/images/find-icon.svg"></use>
              </svg>
            </div>
            <button class="header_search_btn" type="submit">

                <use href="./src/images/map-icon.svg"></use>
              </svg>
            </button>
          </form>
          <nav class="header_nav">
            <div class="header_nav_wrapper">
              <div class="switcher_wrapper">
                <input id="switcher" class="header_switcher" type="checkbox" />
                <label for="switcher" class="header_switcher_label">
                  <span>°C</span><span>°F</span>
                </label>
              </div>
              <button class="header_nav_theme_btn">
                <svg class="header_theme_icon">
                  <use href="./src/images/theme-icon.svg"></use>
                </svg>
              </button>
            </div>
          </nav>
        </div>
      </div>
