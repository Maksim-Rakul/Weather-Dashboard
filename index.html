<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header_wrapper">
          <div class="header_search_wrapper">
            <button class="header_search_btn-loc header_search_btn" type="submit">
                <svg class="header_search_btn-icon">
                  <use href="./src/images/map-icon.svg"></use>
                </svg>
              </button>
            <form class="header_form">
            
              <div class="header_input_wrapper">
                <input
                  class="header_input"
                  type="text"
                  name="city"
                  id="city"
                  placeholder="Find your city..."
                />
                <svg class="header_input_icon">
                  <use href="./src/images/find-icon.svg"></use>
                </svg>
              </div>
              <button class="header_search_btn header_search_btn-q" type="submit">
                Search
              </button>
            </form>
          </div>

          
          <nav class="header_nav">
            <div class="header_nav_wrapper">
              <div class="switcher_wrapper">
                <input id="switcher" class="header_switcher" type="checkbox" />
                <label for="switcher" class="header_switcher_label">
                  <span class="celsius checked">°C</span><span class="fahrenheit">°F</span>
                </label>
              </div>
              <button class="header_nav_theme_btn">
                <svg class="header_theme_icon">
                  <use href="./src/images/theme-icon.svg"></use>
                </svg>
              </button>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <section class="weather">
        <div class="loader">
          <p>Loading, please wait....</p>
        </div>

        <div class="write_message">
          <p>Please enter the name of the city.</p>
        </div>

        <div class="container js-main">
          <div class="weather_today_wrapper"></div>

          <div class="weather_info">
            <div class="weather_days">
              <h3 class="weather_days_title">5-day forecast</h3>
              <ul class="weather_days_list">
              </ul>
            </div>

            <div class="weather_values">

              <ul class="values_list">
                
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
